<svg viewBox="0 0 900 430" width="900" height="430" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Andrés Carvajal Arango — Full Stack Developer y Tech Lead">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4c1d95"/><stop offset="0.55" stop-color="#6d28d9"/><stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <clipPath id="band"><path d="M1,17 a16,16 0 0 1 16,-16 h866 a16,16 0 0 1 16,16 v158 h-898 z"/></clipPath>
  </defs>

  <!-- base dark card (rounded bottom) -->
  <rect x="1" y="1" width="898" height="428" rx="16" fill="#14121f" stroke="#2d2a45"/>

  <!-- hero band with rounded top only -->
  <g clip-path="url(#band)">
    <path d="M1,17 a16,16 0 0 1 16,-16 h866 a16,16 0 0 1 16,16 v158 h-898 z" fill="url(#hero)"/>
    <circle cx="790" cy="30" r="120" fill="#ffffff" opacity="0.07"/>
    <circle cx="90" cy="180" r="80" fill="#ffffff" opacity="0.05"/>
  </g>
  <text x="450" y="78" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="38" font-weight="800" fill="#ffffff">Andrés Carvajal Arango</text>
  <text x="450" y="116" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="18" fill="#ede9fe">Full Stack Developer &amp; Tech Lead</text>
  <text x="450" y="148" text-anchor="middle" font-family="'JetBrains Mono',Consolas,monospace" font-size="13" fill="#ddd6fe">9+ años · Manizales, Colombia · Tech Lead @ BPMco</text>

  <!-- terminal panel -->
  <circle cx="30" cy="207" r="6" fill="#ff5f56"/><circle cx="52" cy="207" r="6" fill="#ffbd2e"/><circle cx="74" cy="207" r="6" fill="#27c93f"/>
  <text x="450" y="211" text-anchor="middle" font-family="'JetBrains Mono',Consolas,monospace" font-size="12" fill="#5f5f7a">— zsh —</text>
  <line x1="20" y1="228" x2="880" y2="228" stroke="#2d2a45"/>

  <text x="30" y="266" font-family="'JetBrains Mono',Consolas,monospace" font-size="15"><tspan fill="#a78bfa">$</tspan> <tspan fill="#6f6f8f">stack --primary</tspan></text>
  <text x="30" y="292" font-family="'JetBrains Mono',Consolas,monospace" font-size="14" fill="#c4b5fd">Next.js · FastAPI · ASP.NET · SQL Server · Python · TypeScript</text>

  <text x="30" y="332" font-family="'JetBrains Mono',Consolas,monospace" font-size="15"><tspan fill="#a78bfa">$</tspan> <tspan fill="#6f6f8f">focus --now</tspan></text>
  <text x="30" y="358" font-family="'JetBrains Mono',Consolas,monospace" font-size="14" fill="#c4b5fd">Productos con IA · Búsqueda semántica · Liderazgo técnico</text>

  <text x="30" y="398" font-family="'JetBrains Mono',Consolas,monospace" font-size="15"><tspan fill="#a78bfa">$</tspan> <tspan fill="#6f6f8f">projects --featured</tspan></text>
  <text x="30" y="424" font-family="'JetBrains Mono',Consolas,monospace" font-size="14" fill="#c4b5fd">MejorDicho! · mejor-dicho.com</text>
  <rect x="285" y="412" width="9" height="15" fill="#a78bfa"/>
</svg>
